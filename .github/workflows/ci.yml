name: CI / CD

on:
  push:
    branches: ["main", "dev"]
    tags:     ["v*.*.*"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════════
# Jobs
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy types-requests

      - name: ruff — lint
        run: ruff check noawclg tests setup.py --output-format=github

      - name: ruff — format check
        run: ruff format --check noawclg tests setup.py

      - name: mypy — type check
        run: mypy noawclg/gfs_dataset.py --ignore-missing-imports

  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }} · ${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:             [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # eccodes is a C library required by cfgrib
      - name: Install eccodes (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libeccodes-dev

      - name: Install eccodes (macOS)
        if: runner.os == 'macOS'
        run: brew install eccodes

      - name: Install eccodes (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install miniconda3 -y
          conda install -c conda-forge eccodes -y

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests (offline only — skip integration)
        run: |
          pytest tests/ -v \
            -m "not integration" \
            --tb=short \
            --cov=noawclg \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=junit/test-results-${{ matrix.python-version }}.xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-${{ matrix.python-version }}
          path: junit/

  # ────────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration tests (network)
    needs: test
    runs-on: ubuntu-latest
    # Only run on pushes to main or explicit dispatches — not on every PR
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install eccodes
        run: sudo apt-get install -y libeccodes-dev

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest

      - name: Run integration tests
        run: pytest tests/ -v -m integration --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    # Build on every push but only publish on tagged releases
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for SCM versioning

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    # Only publish when a version tag is pushed (e.g. v2.1.0)
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/noawclg/

    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses OIDC Trusted Publishing
        # Configure at https://pypi.org/manage/account/publishing/

  # ────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this release
        id: changelog
        run: |
          python3 - <<'EOF'
          import re, pathlib, os
          text = pathlib.Path("CHANGELOG.md").read_text()
          # Match the section for the current version
          pattern = rf"## \[{re.escape('${{ steps.version.outputs.VERSION }}')}\].*?(?=\n## |\Z)"
          match   = re.search(pattern, text, re.S)
          notes   = match.group(0).strip() if match else "See CHANGELOG.md for details."
          pathlib.Path(os.environ["GITHUB_OUTPUT"]).open("a").write(
              f"NOTES<<EOF\n{notes}\nEOF\n"
          )
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       "noawclg ${{ steps.version.outputs.VERSION }}"
          body:       ${{ steps.changelog.outputs.NOTES }}
          files:      dist/*
          draft:      false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}